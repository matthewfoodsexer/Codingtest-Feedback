<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <h1>⚙️ 백준 코드 피드백</h1>

    <div class="section">
      <label for="apiKey">Gemini API Key</label>
      <div class="input-group">
        <input type="password" id="apiKey" placeholder="Google AI Studio에서 발급받은 API Key">
        <button id="toggleKey" class="btn-icon" title="보기/숨기기">👁</button>
      </div>
      <p class="hint">
        <a href="https://aistudio.google.com/apikey" target="_blank">Google AI Studio</a>에서 무료로 발급받을 수 있습니다.
      </p>
    </div>

    <div class="section">
      <label for="model">AI 모델</label>
      <select id="model">
        <option value="gemini-2.5-flash-lite">Gemini 2.5 Flash-Lite (무료, 빠름)</option>
        <option value="gemini-2.5-flash">Gemini 2.5 Flash (무료, 고품질)</option>
        <option value="gemini-2.5-pro">Gemini 2.5 Pro (무료, 최고품질)</option>
      </select>
    </div>

    <div class="section">
      <label for="language">풀이 언어</label>
      <select id="language">
        <option value="C++">C++</option>
        <option value="C">C</option>
        <option value="Python">Python</option>
        <option value="Java">Java</option>
      </select>
    </div>

    <button id="saveBtn" class="btn-primary">저장</button>
    <div id="status" class="status"></div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
